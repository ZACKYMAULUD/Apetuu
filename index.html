<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Kamu ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BACKGROUND EFFECT LAYER -->
<div id="stars"></div>
<div id="flowers"></div>
<div id="butterflies"></div>
<div id="heartCircle"></div>

<!-- CARD -->
<div class="envelope">
    <div class="letter">

        <div id="content">

            <div class="slideshow">

                <img id="slideImage" src="foto1.jpg">

            </div>

            <h1>Hai ❤️</h1>

            <p>
                Mungkin ini cara yang sedikit berbeda,
                tapi aku ingin jujur tentang perasaanku.
            </p>

            <p>
                Kehadiranmu membuat hari-hariku lebih indah.
            </p>

            <h2>Maukah kamu menjadi pacarku? 🥰</h2>

            <div class="buttons">

                <button class="yesBtn" onclick="acceptLove()">
                    Iya ❤️
                </button>

                <button class="noBtn" id="noBtn" onclick="rejectLove()">
                    Tidak 😅
                </button>

            </div>

        </div>

    </div>
</div>

<audio id="bgMusic" loop>
    <source src="audio.mp3" type="audio/mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
